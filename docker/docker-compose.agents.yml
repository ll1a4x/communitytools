# Docker Compose for Kali Agent Containers
#
# This file is for convenience (building, reference). The orchestrator
# spawns containers via `docker run` directly, not via compose.
#
# Usage:
#   docker compose -f docker/docker-compose.agents.yml build
#   docker compose -f docker/docker-compose.agents.yml run --rm agent -p "Your prompt"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.kali-agent
    image: kali-agent
    volumes:
      - ../:/workspace:ro
      - ../outputs:/workspace/outputs:rw
    environment:
      - ANTHROPIC_API_KEY
      # CLAUDECODE must NOT be passed — kills nested Claude sessions
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"
    # Override network per-run:
    #   docker compose run --rm --network <target-network> agent -p "..."
    network_mode: host
